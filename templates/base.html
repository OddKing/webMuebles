{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Muebles Barguay{% endblock %}</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <nav class="navbar navbar-custom bg-dark" style="font-family:Verdana, Geneva, Tahoma, sans-serif;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="{% url 'vista_base' %}" style="text-decoration: none;">
                <img src="{% static 'img/logo.jpg' %}" 
                     style="max-width: 80px; border-radius: 100%; cursor: pointer; transition: transform 0.3s ease;" 
                     alt="Muebles Barguay - Volver al inicio"
                     onmouseover="this.style.transform='scale(1.1)'" 
                     onmouseout="this.style.transform='scale(1)'">
            </a>
            <div class="legal-links">
                <a href="{% url 'terminos' %}" class="legal-link">Términos & Condiciones</a>
                <span style="color: #666; margin: 0 0.5rem;">|</span>
                <a href="{% url 'privacidad' %}" class="legal-link">Política de Privacidad</a>
            </div>
        </div>
    </nav>
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block content %}{% endblock %}

    <!-- Footer Legal -->
    <footer class="legal-footer">
        <div class="container text-center">
            <p class="mb-2">© 2025 Muebles Barguay - Todos los derechos reservados</p>
            <p class="mb-0">
                <a href="{% url 'terminos' %}" class="footer-link">Términos y Condiciones</a> | 
                <a href="{% url 'privacidad' %}" class="footer-link">Política de Privacidad</a>
            </p>
        </div>
    </footer>

    <!-- Bootstrap Bundle con JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
