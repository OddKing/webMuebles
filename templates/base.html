{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Muebles Barguay{% endblock %}</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <nav class="navbar navbar-custom bg-dark" style="font-family:Verdana, Geneva, Tahoma, sans-serif;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="{% url 'index' %}" style="text-decoration: none;">
                <img src="{% static 'img/logo.jpg' %}" 
                     style="max-width: 80px; border-radius: 100%; cursor: pointer; transition: transform 0.3s ease;" 
                     alt="Muebles Barguay - Volver al inicio"
                     onmouseover="this.style.transform='scale(1.1)'" 
                     onmouseout="this.style.transform='scale(1)'">
            </a>
            <div class="legal-links">
                <a href="{% url 'terminos' %}" class="legal-link">Términos & Condiciones</a>
                <span style="color: #666; margin: 0 0.5rem;">|</span>
                <a href="{% url 'privacidad' %}" class="legal-link">Política de Privacidad</a>
            </div>
        </div>
    </nav>
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block content %}{% endblock %}

    <!-- Footer Legal -->
    <footer class="legal-footer">
        <div class="container text-center">
            <p class="mb-2">© 2025 Muebles Barguay - Todos los derechos reservados</p>
            <p class="mb-0">
                <a href="{% url 'terminos' %}" class="footer-link">Términos y Condiciones</a> | 
                <a href="{% url 'privacidad' %}" class="footer-link">Política de Privacidad</a>
            </p>
        </div>
    </footer>

    <!-- Accessibility Widget -->
    <div id="accessibility-controls" class="d-none d-md-flex" style="position: fixed; bottom: 20px; right: 20px; z-index: 10000; display: flex; gap: 5px; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);">
        <button onclick="adjustFontSize(-1)" aria-label="Disminuir letra" style="width: 35px; height: 35px; border-radius: 50%; border: 1px solid #fff; background: #333; color: #fff; font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;">-</button>
        <span style="color: #fff; font-weight: bold; align-self: center; font-size: 14px; margin: 0 5px;">A</span>
        <button onclick="adjustFontSize(1)" aria-label="Aumentar letra" style="width: 35px; height: 35px; border-radius: 50%; border: 1px solid #fff; background: #333; color: #fff; font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;">+</button>
        
        <!-- Divider -->
        <div style="width: 1px; background: rgba(255,255,255,0.3); margin: 0 5px;"></div>
        
        <!-- Voice Toggle -->
        <button id="voice-toggle" onclick="toggleVoice()" aria-label="Activar Narrador" style="width: 35px; height: 35px; border-radius: 50%; border: 1px solid #fff; background: #333; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;">
            <i class="bi bi-volume-up-fill"></i>
        </button>
    </div>

    <style>
        #accessibility-controls button:hover { background: #555 !important; transform: scale(1.1); }
        #accessibility-controls button.active { background: #28a745 !important; border-color: #28a745 !important; }
        .speaking-highlight { outline: 2px solid #ffc107 !important; background: rgba(255, 193, 7, 0.1); }
        @media (max-width: 768px) {
            #accessibility-controls { bottom: 15px; right: 15px; padding: 10px; }
            #accessibility-controls button { width: 40px; height: 40px; font-size: 20px; }
        }
    </style>

    <script>
        // Remove bootstrap classes that might hide it
        document.getElementById('accessibility-controls').className = ''; 

        // Font Size Logic
        function adjustFontSize(change) {
            const html = document.documentElement;
            let currentSize = parseFloat(window.getComputedStyle(html).fontSize);
            if (isNaN(currentSize)) currentSize = 16;
            let newSize = currentSize + change;
            if (newSize < 12) newSize = 12;
            if (newSize > 28) newSize = 28;
            html.style.fontSize = newSize + 'px';
            localStorage.setItem('userFontSize', newSize);
        }

        (function() {
            const savedSize = localStorage.getItem('userFontSize');
            if (savedSize) {
                document.documentElement.style.fontSize = savedSize + 'px';
            }
        })();

        // Voice Guide Logic
        let voiceEnabled = false;
        let synthesis = window.speechSynthesis;
        let currentUtterance = null;

        function toggleVoice() {
            voiceEnabled = !voiceEnabled;
            const btn = document.getElementById('voice-toggle');
            
            if (voiceEnabled) {
                btn.classList.add('active');
                btn.innerHTML = '<i class="bi bi-mic-fill"></i>';
                speak("Narrador activado. Pase el mouse sobre el texto para escuchar.");
                localStorage.setItem('voiceEnabled', 'true');
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '<i class="bi bi-volume-mute-fill"></i>';
                synthesis.cancel();
                speak("Narrador desactivado.");
                localStorage.setItem('voiceEnabled', 'false');
                // Reset icon after speaking
                setTimeout(() => { if(!voiceEnabled) btn.innerHTML = '<i class="bi bi-volume-up-fill"></i>'; }, 2000);
            }
        }

        function speak(text) {
            if (!text) return;
            synthesis.cancel(); // Stop previous
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-ES'; // Prefer Spanish
            synthesis.speak(utterance);
        }

        function handleInteraction(event) {
            if (!voiceEnabled) return;
            
            const target = event.target;
            // Read text from relevant elements
            if (['P', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6', 'A', 'BUTTON', 'LABEL', 'SPAN', 'LI', 'TD', 'TH'].includes(target.tagName)) {
                let text = target.innerText || target.textContent;
                if (target.tagName === 'IMG' && target.alt) text = "Imagen: " + target.alt;
                
                if (text && text.trim().length > 0) {
                    // Visual feedback
                    document.querySelectorAll('.speaking-highlight').forEach(el => el.classList.remove('speaking-highlight'));
                    target.classList.add('speaking-highlight');
                    
                    speak(text);
                    
                    // Remove highlight when done (approximate) or on mouseout
                    target.addEventListener('mouseleave', () => {
                        target.classList.remove('speaking-highlight');
                        synthesis.cancel();
                    }, {once: true});
                }
            }
        }

        document.addEventListener('mouseover', handleInteraction);
        document.addEventListener('focus', handleInteraction, true); // Capture phase for focus

        // Restore state
        if (localStorage.getItem('voiceEnabled') === 'true') {
            // Don't auto-enable speech on load to avoid annoyance, but show state?
            // Better to let user activate it. Or maybe just set the visual state but wait for interaction?
            // For now, let's keep it off by default on reload unless we want persistent "Always On".
            // User asked for "guide", usually implies on-demand. 
            // Let's NOT auto-enable on reload to prevent unexpected talking, but we could.
            // I'll leave it manual for now for better UX.
        }
    </script>

    <!-- Bootstrap Bundle con JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
